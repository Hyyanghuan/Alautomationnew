# yaml-language-server: $schema=https://json.schemastore.org/docker-compose.json

name: ai-test-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: aitest-postgres
    environment:
      POSTGRES_USER: aitest
      POSTGRES_PASSWORD: aitest123
      POSTGRES_DB: ai_test_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U aitest -d ai_test_platform
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aitest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: aitest-minio
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aitest-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aitest:aitest123@postgres:5432/ai_test_platform
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      PLAYWRIGHT_BROWSERS_PATH: /app/data/browsers
      PLAYWRIGHT_SCREENSHOTS_PATH: /app/data/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: .env
        target: /app/.env
        read_only: true
      - type: bind
        source: ./backend/app
        target: /app/app
      - type: bind
        source: ./backend/data
        target: /app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aitest-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data: {}
  redis_data: {}
  minio_data: {}
