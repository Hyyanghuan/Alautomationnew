name: Code Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      working-directory:
        description: '审计目录'
        required: false
        default: '.'

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行代码审计 Skill
        uses: Hyyanghuan/code-audit-skill@main
        with:
          working-directory: ${{ github.event.inputs.working-directory || '.' }}
          fail-on-findings: 'true'

          # 扫描模块开关
          enable-gitleaks: 'true'
          enable-super-linter: 'true'
          enable-bandit: 'true'
          enable-dependency-scan: 'true'
          enable-custom-rules: 'true'
          enable-test-cases: 'true'

          # Telegram 通知（需配置 Secrets: TG_BOT_TOKEN, TG_CHAT_ID）
          enable-telegram: ${{ secrets.TG_BOT_TOKEN != '' }}
          telegram-bot-token: ${{ secrets.TG_BOT_TOKEN }}
          telegram-chat-id: ${{ secrets.TG_CHAT_ID }}
          telegram-bot-username: '@test_skills_yh_bot'
