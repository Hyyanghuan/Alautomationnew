name: Code Audit

on:
  push:
    branches: [main,develop,master]
  pull_request:
    branches: [main, develop,master]
  workflow_dispatch:
    inputs:
      working-directory:
        description: '审计目录'
        required: false
        default: '.'

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行代码审计 Skill
        uses: Hyyanghuan/code-audit-skill@main
        with:
          working-directory: ${{ github.event.inputs.working-directory || '.' }}
          fail-on-findings: 'true'
          enable-telegram: 'true'    # 可省略，默认已是 true
          # 扫描模块开关
          enable-gitleaks: 'true'
          enable-super-linter: 'true'
          enable-bandit: 'true'
          enable-dependency-scan: 'true'
          enable-custom-rules: 'true'
          enable-test-cases: 'true'

